# Test configuration with H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA/Hibernate Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=test-secret-key-for-jwt-tokens-in-tests
jwt.access-token.expiration=86400
jwt.refresh-token.expiration=604800

# Disable email during tests
spring.mail.host=localhost
app.mail.from=test@roomiehub.com
app.mail.verification-url=http://localhost:8080/api/auth/verify-email

# Server Configuration
server.port=8080
logging.level.com.campusnest.campusnest_platform=DEBUG